<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Desafio 2 - Cadastro de Aluno</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <main class="container py-5">

    <h1 class="text-center mb-4">Cadastro Simples de Aluno</h1>

    <section class="card shadow p-4 mx-auto" style="max-width: 700px;">

      <div class="mb-3">
        <label for="nomeAluno" class="form-label">Nome do aluno</label>
        <input type="text" id="nomeAluno" class="form-control">
      </div>

      <div class="mb-3">
        <label for="cursoAluno" class="form-label">Curso</label>
        <input type="text" id="cursoAluno" class="form-control">
      </div>

      <div class="mb-3">
        <label for="idadeAluno" class="form-label">Idade</label>
        <input type="number" id="idadeAluno" class="form-control">
      </div>

      <button id="btnCadastrar" class="btn btn-success">
        Cadastrar aluno
      </button>

      <div id="resultadoCadastro" class="mt-4 p-3 border rounded bg-white d-none"></div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
