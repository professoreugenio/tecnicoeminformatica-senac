<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <style>
        #retorno {
            width: 450px;
            border: solid 1px #ccc;
            border-radius: 10px;
            padding: 20px 10px;
            margin: 20px auto;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row" style="display: flex;justify-content: center;">
            <div class="col-6">
                <header>
                    <!-- place navbar here -->
                    <h1>APLICAÇÃO COM getelement</h1>
                </header>
                <form action="" method="get" id="formDeTeste" class="p-3 border rounded shadow-sm">
                    <label for="dados" class="form-label">
                        Nome
                    </label>
                    <div class="input-group mb-2">
                        <input type="text" class="form-control" name="nome" id="dados" placeholder="Digite seu nome"
                            aria-describedby="btnRegistro" required>
                        <button type="button" class="btn btn-primary" id="btnRegistro">
                            Registrar
                        </button>
                    </div>
                    <small class="form-text text-body-secondary">
                        Informe o nome completo.
                    </small>
                </form>
            </div>
        </div>
        <div class="col-12">
            <div id="retorno">Texto</div>
        </div>
    </div>
    <main>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script>
        const meuBotao = document.getElementById("btnRegistro");
        const meuInput = document.getElementById("dados");
        const retornotexto = document.getElementById("retorno");
        const corVerde = "rgba(25,135,84,0.2)";
        const corLaranja = "rgba(253,126,20,0.2)";
        const corVermelho = "rgba(220,53,69,0.2)";
        const t1 = "<b>" + dadoinput + " </b> registrado com sucesso!";
        const t2 = "Digite valores acima de 5 dígitos";
        const t3 = "Campo está vazio";

        function retornoFinal(cor, frase) {
            retornotexto.style.display = "block";
            retornotexto.style.backgroundColor = cor;
            retornotexto.innerHTML = frase
            return
        }

        meuBotao.addEventListener("click", () => {
            const dadoinput = meuInput.value
            if (dadoinput === "") {
                retornoFinal(corLaranja, t3)
            } else if (dadoinput.length < 5) {
                retornoFinal(corVermelho, t2)
            } else {
                retornoFinal(corVerde, t1)
            }
            console.log("Botão acionado: " + dadoinput)
        })

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
