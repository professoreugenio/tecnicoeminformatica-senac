<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrays em JavaScript</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Dev Sistema Eugênio</span>
    </div>
  </nav>

  <header class="hero text-center text-white py-5">
    <div class="container">
      <h1>Arrays em JavaScript</h1>
      <p>Aprenda a criar, listar, filtrar e remover dados usando arrays.</p>
    </div>
  </header>

  <main class="container my-5">

    <section class="card shadow p-4 mb-4">
      <h2 class="h4 mb-3">Cadastrar Produto</h2>

      <form id="formProduto">
        <div class="row g-3">

          <div class="col-md-6">
            <label for="produto" class="form-label">Nome do produto</label>
            <input type="text" id="produto" class="form-control" placeholder="Ex: Mouse Gamer">
          </div>

          <div class="col-md-4">
            <label for="preco" class="form-label">Preço</label>
            <input type="number" id="preco" class="form-control" placeholder="Ex: 150" step="0.01">
          </div>

          <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Adicionar</button>
          </div>

        </div>
      </form>
    </section>

    <section class="card shadow p-4 mb-4">
      <h2 class="h4 mb-3">Filtrar Produtos</h2>

      <input type="text" id="filtro" class="form-control" placeholder="Digite para pesquisar...">
    </section>

    <section class="row mb-4">
      <div class="col-md-6 mb-3">
        <div class="card text-center p-4 shadow">
          <h3 class="h5">Total de Produtos</h3>
          <p id="totalProdutos" class="display-6">0</p>
        </div>
      </div>

      <div class="col-md-6 mb-3">
        <div class="card text-center p-4 shadow">
          <h3 class="h5">Valor Total</h3>
          <p id="totalValores" class="display-6">R$ 0,00</p>
        </div>
      </div>
    </section>

    <section class="card shadow p-4">
      <h2 class="h4 mb-3">Produtos Cadastrados</h2>

      <ul id="listaProdutos" class="list-group"></ul>
    </section>

  </main>

  <footer class="bg-dark text-white text-center py-3">
    Desenvolvido com HTML5, CSS3, Bootstrap e JavaScript
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
