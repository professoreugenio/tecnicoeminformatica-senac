<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Lista com localStorage e JSON</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Task JSON</a>

      <div>
        <a href="#" class="btn btn-outline-light btn-sm">Início</a>
        <a href="#" class="btn btn-outline-light btn-sm">Tarefas</a>
        <a href="#" class="btn btn-outline-light btn-sm">Ajuda</a>
      </div>
    </div>
  </nav>

  <header class="bg-primary text-white text-center p-5">
    <div class="container">
      <h1>Lista com localStorage e JSON</h1>
      <p>Adicione tarefas e mantenha os dados salvos no navegador</p>
    </div>
  </header>

  <main class="container my-5">

    <section class="card p-4 shadow-sm">

      <h2 class="mb-3">Cadastro de tarefas</h2>

      <div class="mb-3">
        <label for="inputTarefa" class="form-label">Digite uma tarefa</label>
        <input 
          type="text" 
          id="inputTarefa" 
          class="form-control" 
          placeholder="Ex: Estudar JavaScript"
        >
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <button id="btnAdicionar" class="btn btn-primary">
          Adicionar tarefa
        </button>

        <button id="btnLimparTudo" class="btn btn-danger">
          Limpar tudo
        </button>
      </div>

      <p id="mensagem" class="mt-3 fw-bold"></p>

      <hr>

      <h3>Lista de tarefas</h3>

      <ul id="listaTarefas" class="list-group mt-3">
        <!-- As tarefas serão adicionadas pelo JavaScript -->
      </ul>

    </section>

  </main>

  <footer class="bg-dark text-white text-center p-3">
    <p class="mb-0">Desenvolvido com HTML, Bootstrap e JavaScript</p>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
