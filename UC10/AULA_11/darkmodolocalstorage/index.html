<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TaskFlow - Modo Dark</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <header>
    <h1>📋 TaskFlow</h1>

    <button id="btnDark">
      🌙 Dark Mode
    </button>
  </header>

  <main>

    <section class="task-container">
      <input 
        type="text" 
        id="taskInput" 
        placeholder="Digite uma tarefa..."
      >

      <button id="btnAdd">
        Adicionar
      </button>
    </section>

    <section id="taskList" class="task-list">
      
    </section>

    

  </main>

  <footer>
    Desenvolvido com HTML5, CSS3 e JavaScript
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
